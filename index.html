<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reyting Vidjeti - Tuzatilgan Variant</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
    </style>
</head>
<body>

<section class="reviews">
    <div class="reviews__summary">
        <h2 class="reviews__rating">4.7</h2>
        <div class="reviews__stars-main">
            <span>★</span><span>★</span><span>★</span><span>★</span><span class="star-half">★</span>
        </div>
    </div>

    <div class="reviews__chart">
      
        <div class="reviews__bar-row">
            <div class="reviews__bar-stars">★★★★★</div>
            <progress class="reviews__progress" value="85" max="100"></progress>
            <span class="reviews__percentage">67%</span>
        </div>

        <div class="reviews__bar-row">
            <div class="reviews__bar-stars">★★★★<span class="star--gray">★</span></div>
            <progress class="reviews__progress" value="65" max="100"></progress>
            <span class="reviews__percentage">23%</span>
        </div>

        <div class="reviews__bar-row">
            <div class="reviews__bar-stars">★★★<span class="star--gray">★★</span></div>
            <progress class="reviews__progress" value="55" max="100"></progress>
            <span class="reviews__percentage">7%</span>
        </div>

        <div class="reviews__bar-row">
            <div class="reviews__bar-stars">★★<span class="star--gray">★★★</span></div>
            <progress class="reviews__progress" value="30" max="100"></progress>
            <span class="reviews__percentage">2%</span>
        </div>

        <div class="reviews__bar-row">
            <div class="reviews__bar-stars">★<span class="star--gray">★★★★</span></div>
            <progress class="reviews__progress" value="15" max="100"></progress>
            <span class="reviews__percentage">1%</span>
        </div>
    </div>

    <div class="reviews__footer">Trusted by leading companies</div>
</section>

</body>
</html>
